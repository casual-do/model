<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>取件表</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ===== CSS 变量 ===== */
        :root {
            /* ========== 1. 只需要改这个背景色 ========== */
            --page-bg: #f0f2f5;

            /* ========== 2. 下面全部自动计算，不用动 ========== */
            /* 阴影：背景色加深 13% */
            --shadow-dark: color-mix(in srgb, var(--page-bg), #000 15%);
            /* 高光：背景色提亮 10% */
            --shadow-light: color-mix(in srgb, var(--page-bg), #fff 20%);

            /* 最终自动生成的完美拟态阴影 8 8 16*/
            /* 最终自动生成的完美拟态阴影 6 6 12*/
            --neu-shadow: 6px 6px 12px var(--shadow-dark),
            -6px -6px 12px var(--shadow-light);

            --neu-inset-shadow: inset 1.5px 1.5px 3px var(--shadow-dark),
            inset -1.5px -1.5px 3px var(--shadow-light);
        }

        /* ===== 页面基础 ===== */
        body {
            font-family: "JetBrains Mono Medium", "幼圆", Arial, sans-serif;
            font-size: 13px;
            background: #f0f2f5;
            color: var(--text-color, #333);
            padding: 10px;
        }

        /* ===== 顶部栏 ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* 拟态按钮通用样式 */
        .neu-btn {
            padding: 3px 11px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            background: var(--page-bg);
            color: var(--text-color, #555);
            white-space: nowrap;
            box-shadow: var(--neu-shadow);
            cursor: pointer;
            transition: box-shadow 0.15s;
        }
        .neu-btn:hover {
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }
        .neu-btn.active {
            box-shadow: none;
            background: var(--page-bg);
            color: var(--accent, #1677ff);
            font-weight: bold;
        }

        /* 当前文件名，样式同按钮 */
        #currentFile {
            padding: 3px 11px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            background: var(--page-bg);
            color: var(--text-color, #888);
            opacity: 0.7;
            white-space: nowrap;
            box-shadow: var(--neu-shadow);
            margin-left: 6px;
        }

        /* 文件列表按钮使用 neu-btn 类 */

        /* Tab 栏容器，靠右对齐 */
        .tabs {
            display: flex;
            gap: 12px;
            margin-left: auto;
            align-items: center;
        }

        /* 单个 Tab 默认样式 */
        .tab {
            padding: 3px 11px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            background: var(--page-bg);
            color: var(--text-color, #555);
            box-shadow: var(--neu-shadow);
            transition: box-shadow 0.15s;
        }
        .tab:hover {
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        /* 当前激活的 Tab */
        .tab.active {
            box-shadow: none;
            background: var(--page-bg);
            color: var(--accent, #1677ff);
            font-weight: bold;
        }

        /* ===== 普通视图（按部位 / 按板件）网格 ===== */
        /* 弹性换行，卡片宽度由内容决定 */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-start;
        }
        .grid > * {
            flex: 0 0 auto;
        }

        /* 普通卡片容器，拟态效果 */
        .card {
            background: var(--page-bg, #f0f2f5);
            border: none;
            border-radius: 7px;
            overflow: hidden;
            box-shadow: var(--neu-shadow);
        }

        /* 卡片彩色标题栏 */
        .card-title {
            color: #fff;
            padding: 3px 8px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 标题栏右侧"共N件"小字 */
        .badge {
            font-size: 11px;
            opacity: 0.82;
        }

        /* ===== 卡片内部表格 ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            background: color-mix(in srgb, var(--page-bg), #fff 82%);
        }

        /* 表头：灰色小字，不换行 */
        th {
            color: var(--text-color);
            font-weight: normal;
            font-size: 11px;
            padding: 2px 5px;
            border-bottom: 1px solid color-mix(in srgb, var(--page-bg), #000 12%);
            background: color-mix(in srgb, var(--page-bg), #000 5%);
            white-space: nowrap;
            opacity: 0.6;
        }

        /* 表格单元格，不换行防止撑宽 */
        td {
            padding: 2px 5px;
            border-bottom: 1px solid color-mix(in srgb, var(--page-bg), #000 8%);
            color: var(--text-color, #333);
            white-space: nowrap;
        }

        /* 最后一行去掉底边框 */
        tr:last-child td {
            border-bottom: none;
        }

        /* ===== 按板件视图：部位标签列 ===== */
        /* 部位标签容器，flex 换行 */
        .parts-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 2px 4px;
        }

        /* 单个部位标签，背景色由 JS 按部位颜色设置 */
        .part-tag {
            display: inline-block;
            white-space: nowrap;
            font-size: 11px;
            padding: 0 5px;
            border-radius: 3px;
            line-height: 18px;
        }

        /* ===== 按部位视图：板件分组交替灰度 ===== */
        /* 偶数板件组 */
        .pg0 td {
            background: color-mix(in srgb, var(--page-bg), #fff 82%);
        }

        /* 奇数板件组，与 pg0 交替产生分组视觉 */
        .pg1 td {
            background: color-mix(in srgb, var(--page-bg), #000 4%);
        }

        /* 数量列：居中加粗 */
        .qty {
            text-align: center;
            font-weight: bold;
            color: var(--accent, #1677ff);
        }

        /* 次要信息（如板件号）：浅灰小字 */
        .muted {
            color: var(--text-color);
            font-size: 11px;
            opacity: 0.56;
        }

        /* 编号列：中等字重 */
        .comp-label {
            font-weight: 500;
        }

        /* 备注小字（按部位/按板件表格内） */
        .note-text {
            font-size: 10px;
            color: #f59e0b;
            font-weight: normal;
            white-space: normal;
            line-height: 1.3;
            margin-top: 1px;
        }

        /* 有 tooltip 的 chip 加虚线下划线提示可悬停 */
        .chip[title] {
            text-decoration: underline dotted currentColor;
            text-underline-offset: 2px;
        }

        /* ===== 通用（紧凑）视图 ===== */
        /* 紧凑网格，最小列宽 140px；.horizontal 横排滚动 */
        .cgrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }
        .cgrid.horizontal {
            column-width: 180px;
            column-gap: 16px;
            display: block;
        }
        .cgrid.horizontal > * {
            break-inside: avoid;
            margin-bottom: 16px;
        }

        /* 紧凑卡片，拟态效果 */
        .ccard {
            background: var(--page-bg, #f0f2f5);
            border: none;
            border-radius: 7px;
            overflow: hidden;
            box-shadow: var(--neu-shadow);
        }

        /* 紧凑卡片标题栏 */
        .ccard-title {
            color: #fff;
            padding: 2px 7px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 紧凑卡片内容区，竖向排列各板件行 */
        .ccard-body {
            padding: 4px 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* 单个板件行：板件标签 + 编号芯片横排 */
        .panel-row {
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }

        /* 板件编号标签（如"A""B1"），背景色由 JS 按板件颜色设置 */
        .panel-lbl {
            font-size: 10px;
            color: #fff;
            border-radius: 3px;
            padding: 1px 5px;
            line-height: 16px;
            white-space: nowrap;
            flex-shrink: 0; /* 防止被挤压 */
            margin-top: 1px;
        }

        /* 编号芯片容器，允许换行 */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        /* 单个编号芯片，背景/文字颜色由 JS 按部位颜色设置 */
        .chip {
            position: relative;
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            padding: 0 5px;
            border-radius: 3px;
            line-height: 1.5;
            white-space: nowrap;
        }

        /* 数量角标（仅数量>1时渲染），红底白字圆形 */
        .chip sup {
            font-size: 8px;
            font-weight: lighter;
            color: #ececec;
            position: absolute;
            top: -3px;
            right: -5px;
            background: rgb(0 0 0 / 0.56);
            border-radius: 3px; /* 圆形；改为 0 = 方形，3px = 圆角方形 */
            width: 10px;
            height: 10px;
            line-height: 10px;
            text-align: center;
            padding: 0;
        }

        /* 有角标的芯片右侧留出空间，避免角标被遮挡 */
        .chip.has-sup {
            margin-right: 6px;
        }

        /* 通用视图卡片拖拽 */
        .ccard.dragging { opacity: 0.4; }
        .ccard.drag-over { outline: 2px dashed #1677ff; outline-offset: -2px; }
        .ccard { cursor: grab; }
        .ccard:active { cursor: grabbing; }

        /* 紧凑卡片底部备注行 */
        .compact-notes {
            border-top: 1px solid var(--shadow-dark);
            padding: 3px 0;
            margin-top: 2px;
        }
        .compact-note {
            font-size: 10px;
            color: #f59e0b;
            line-height: 1.4;
            padding: 1px 0;
        }
        .compact-note .note-panel {
            font-weight: 600;
            margin-right: 4px;
        }

        /* ===== 通用工具类 ===== */
        /* 空数据提示文字 */
        .placeholder {
            color: var(--text-color, #bbb);
            opacity: 0.5;
            padding: 30px;
            text-align: center;
        }

        /* 隐藏元素 */
        /* 隐藏元素（important 确保覆盖所有 display 设置）*/
        .hidden {
            display: none !important;
        }

        /* ===== 总数统计标签（Tab 栏内右侧）===== */
        .total-badge {
            background: var(--page-bg);
            border: none;
            color: var(--text-color, #555);
            border-radius: 6px;
            padding: 3px 11px;
            font-size: 12px;
            white-space: nowrap;
            box-shadow: var(--neu-shadow);
            transition: box-shadow 0.15s;
        }

        /* 总数标签内的数字，蓝色加粗 */
        .total-badge .tb-num {
            font-weight: bold;
            color: #1677ff;
        }

        /* ===== 布局 ===== */
        .layout {
            display: block;
            filter: brightness(var(--brightness, 1));
            transition: filter 0.2s;
        }

        /* ===== 文件列表悬浮面板（左侧固定，header 下方起始）===== */
        .sidebar {
            position: fixed;
            top: 44px;
            left: 0;
            height: calc(100vh - 44px);
            width: 140px;
            background: var(--page-bg);
            border-right: 1px solid var(--shadow-dark);
            border-radius: 0 8px 8px 0;
            z-index: 1000;
            padding: 10px 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* 单个文件芯片 */
        .file-chip {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-color, #555);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-chip:hover {
            background: color-mix(in srgb, var(--page-bg), #000 8%);
        }

        /* 当前加载的文件芯片高亮 */
        .file-chip.active {
            box-shadow: none;
            background: var(--page-bg);
            color: var(--accent, #1677ff);
            font-weight: bold;
        }

        /* 文件夹文件列表分隔线 */
        .sidebar-separator {
            font-size: 10px;
            color: var(--text-color, #888);
            padding: 6px 8px 2px;
            opacity: 0.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top: 1px solid var(--shadow-dark);
            margin-top: 4px;
        }

    </style>
</head>
<body>

<div class="header">
    <div id="toggleFileList" class="neu-btn">文件</div>
    <div id="pickFolderBtn" class="neu-btn" title="选择模型数据文件夹">📁</div>
    <div id="currentFile" class="hidden"></div>
    <div class="tabs">
        <div id="statsBar" class="total-badge hidden"></div>
        <div class="tab active" data-view="compact">通用</div>
        <div class="tab" data-view="part">部位</div>
        <div class="tab" data-view="panel">板件</div>
        <div id="bgToggle" class="neu-btn" title="切换明暗背景">白</div>
        <div id="layoutToggle" class="neu-btn" title="切换横排/竖排">竖</div>
    </div>
</div>

<div class="layout">
    <div class="main">
        <div id="viewCompact" class="cgrid"></div>
        <div id="viewPart" class="grid hidden"></div>
        <div id="viewPanel" class="grid hidden"></div>
    </div>
    <div id="sidebar" class="sidebar hidden">
        <div id="folderRow" style="display:flex;gap:4px;margin-bottom:8px;width:100%">
            <div id="folderPathDisplay" class="neu-btn" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left" title="选择数据文件夹">📁 选择文件夹</div>
        </div>
        <div id="fileList"></div>
    </div>
</div>


<script>
    const COLOR_POOL = [
        '#e6194b', '#f58231', '#e68a00', '#cca300',
        '#3cb44b', '#2ca02c', '#469990', '#17becf',
        '#4363d8', '#1565C0', '#911eb4', '#7b1fa2',
        '#c74b9b', '#f032e6', '#ee4422', '#00acc1',
    ];
    const colorMap = {};

    function getColor(key) {
        if (!colorMap[key]) {
            let hash = 0;
            for (let i = 0; i < key.length; i++) {
                hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
            }
            colorMap[key] = COLOR_POOL[hash % COLOR_POOL.length];
        }
        return colorMap[key];
    }

    // 文件列表开关（悬浮面板）
    document.getElementById('toggleFileList').addEventListener('click', () => {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggleFileList');
        const hidden = sidebar.classList.toggle('hidden');
        btn.classList.toggle('active', !hidden);
    });

    document.addEventListener('click', e => {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggleFileList');
        if (!sidebar.classList.contains('hidden') &&
            !sidebar.contains(e.target) &&
            !btn.contains(e.target)) {
            sidebar.classList.add('hidden');
            btn.classList.remove('active');
        }
    });

    // ════════════════════════════════════════════════
    //  FSA — 单个 settings.json 读写（与日历记事本一致）
    // ════════════════════════════════════════════════
    const FSA_OK = 'showOpenFilePicker' in window;
    const FILE_TYPES = [{ description: '设置文件', accept: { 'application/json': ['.json'] } }];

    let settingsHandle = null;
    let saved = { bgMode: 'light', layoutH: '0', lastFile: '' };

    // IndexedDB
    function openIDB() {
        return new Promise((res, rej) => {
            const req = indexedDB.open('qjb-settings', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
            req.onsuccess = e => res(e.target.result);
            req.onerror = () => rej(req.error);
        });
    }
    async function idbSet(key, val) {
        const db = await openIDB();
        return new Promise((res, rej) => {
            const tx = db.transaction('kv', 'readwrite');
            tx.objectStore('kv').put(val, key);
            tx.oncomplete = res; tx.onerror = () => rej(tx.error);
        });
    }
    async function idbGet(key) {
        const db = await openIDB();
        return new Promise((res, rej) => {
            const tx = db.transaction('kv', 'readonly');
            const req = tx.objectStore('kv').get(key);
            req.onsuccess = () => res(req.result);
            req.onerror = () => rej(req.error);
        });
    }

    function mkEl(tag, cls, props = {}) {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        Object.assign(el, props);
        return el;
    }
    function mkBtn(text, onClick, primary = false) {
        const btn = document.createElement('button');
        btn.className = 'neu-btn' + (primary ? ' active' : '');
        btn.textContent = text;
        btn.addEventListener('click', onClick);
        return btn;
    }

    // 连接 settings.json
    async function connectSettings(handle, storeToIDB = true) {
        settingsHandle = handle;
        if (storeToIDB) await idbSet('settings-handle', handle);
        const file = await handle.getFile();
        const text = (await file.text()).trim();
        try {
            const data = text ? JSON.parse(text) : {};
            Object.assign(saved, data);
        } catch (e) { /* 保持默认值 */ }
        applySavedSettings();
        updateFileBar();
        // 尝试恢复数据目录
        tryLoadDataDir();
    }

    // 将当前配置写回 settings.json
    async function flushSettings() {
        if (!settingsHandle) return;
        try {
            const w = await settingsHandle.createWritable();
            await w.write(JSON.stringify(saved, null, 2));
            await w.close();
        } catch (e) { /* 权限丢失 */ }
    }

    // 打开已有文件
    async function pickSettingsFile() {
        try {
            const [h] = await window.showOpenFilePicker({ types: FILE_TYPES, multiple: false });
            await connectSettings(h);
        } catch (e) { /* 用户取消 */ }
    }

    // 新建 settings.json
    async function createSettingsFile() {
        try {
            const h = await window.showSaveFilePicker({ suggestedName: 'settings.json', types: FILE_TYPES });
            const w = await h.createWritable();
            await w.write(JSON.stringify(saved, null, 2));
            await w.close();
            await connectSettings(h);
        } catch (e) { /* 用户取消 */ }
    }

    // 重新授权
    async function reconnectSettings(handle) {
        try {
            const perm = await handle.requestPermission({ mode: 'readwrite' });
            if (perm === 'granted') await connectSettings(handle, false);
            else updateFileBar();
        } catch (e) { updateFileBar(); }
    }

    // 文件状态栏（与日历记事本一致）
    function updateFileBar() {
        const bar = document.getElementById('file-status');
        if (!bar) return;
        bar.innerHTML = '';
        if (!FSA_OK) {
            bar.append(mkEl('span', 'fb-dot red'), mkEl('span', '', { textContent: '浏览器不支持 File System API' }));
            return;
        }
        if (!settingsHandle) {
            bar.append(mkEl('span', 'fb-dot orange'), mkEl('span', '', { textContent: '未选择配置文件' }),
                mkBtn('打开', pickSettingsFile), mkBtn('新建', createSettingsFile, true));
            return;
        }
        bar.append(mkEl('span', 'fb-dot green'), mkEl('span', '', { textContent: settingsHandle.name }));
    }

    const LIGHT_BG = '#f5f0eb', DARK_BG = '#000000';

    function applyBg(mode) {
        const isLight = mode !== 'dark';
        document.body.style.background = isLight ? LIGHT_BG : DARK_BG;
        document.getElementById('bgToggle').textContent = isLight ? '白' : '黑';
        saved.bgMode = isLight ? 'light' : 'dark';
        const root = document.documentElement;
        root.style.setProperty('--page-bg', isLight ? LIGHT_BG : DARK_BG);
        root.style.setProperty('--accent', isLight ? '#1677ff' : '#66b0ff');
        root.style.setProperty('--text-color', '#333');
        root.style.setProperty('--brightness', isLight ? '1' : '0.7');
    }

    function toggleLayout() {
        const btn = document.getElementById('layoutToggle');
        const isH = btn.classList.toggle('active');
        btn.textContent = isH ? '横' : '竖';
        document.getElementById('viewCompact').classList.toggle('horizontal', isH);
        saved.layoutH = isH ? '1' : '0';
    }

    function applySavedSettings() {
        applyBg(saved.bgMode || 'light');
        if (saved.layoutH === '1') toggleLayout();
    }

    document.getElementById('bgToggle').addEventListener('click', () => {
        applyBg((saved.bgMode || 'light') === 'light' ? 'dark' : 'light');
        flushSettings();
    });
    document.getElementById('layoutToggle').addEventListener('click', () => {
        toggleLayout();
        flushSettings();
    });

    // Tab 切换
    const VIEWS = ['compact', 'part', 'panel'];
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
            const v = tab.dataset.view;
            VIEWS.forEach(id => document.getElementById('view' + id[0].toUpperCase() + id.slice(1)).classList.toggle('hidden', v !== id));
        });
    });

    // ════════════════════════════════════════════════
    //  数据文件夹加载（拖拽 / 按钮 / FSA showDirectoryPicker）
    // ════════════════════════════════════════════════
    let allFiles = [];

    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = reject;
            r.readAsText(file);
        });
    }

    function processEntry(entry) {
        return new Promise(resolve => {
            if (entry.isFile) {
                entry.file(async file => {
                    if (!/\.(json|txt)$/i.test(file.name)) { resolve([]); return; }
                    const text = await readFileAsText(file);
                    try { resolve([{ name: file.name, data: JSON.parse(text.trim() || '{}') }]); }
                    catch { resolve([]); }
                }, () => resolve([]));
            } else if (entry.isDirectory) {
                const reader = entry.createReader();
                const all = [];
                function readBatch() {
                    reader.readEntries(async entries => {
                        if (!entries.length) { resolve(all.flat()); return; }
                        const batch = await Promise.all(Array.from(entries).map(processEntry));
                        all.push(...batch.flat());
                        readBatch();
                    }, () => resolve(all.flat()));
                }
                readBatch();
            } else resolve([]);
        });
    }

    async function setFolderFiles(files) {
        allFiles = files;
        const listEl = document.getElementById('fileList');
        listEl.innerHTML = '';
        if (!files.length) {
            listEl.innerHTML = '<div style="padding:20px 8px;text-align:center;color:#999;font-size:12px">文件夹中没有 JSON/TXT 文件</div>';
            return;
        }
        files.forEach(f => {
            const chip = document.createElement('div');
            chip.className = 'file-chip';
            chip.textContent = f.name.replace(/\.(json|txt)$/i, '');
            chip.addEventListener('click', () => {
                document.querySelectorAll('.file-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                render(extractItems(f.data));
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('toggleFileList').classList.remove('active');
                document.getElementById('currentFile').textContent = f.name;
                document.getElementById('currentFile').classList.remove('hidden');
                saved.lastFile = f.name.replace(/\.(json|txt)$/i, '');
                flushSettings();
            });
            listEl.appendChild(chip);
        });
        const chips = listEl.querySelectorAll('.file-chip');
        const last = saved.lastFile ? saved.lastFile.replace(/\.(json|txt)$/i, '') : '';
        if (last) {
            const found = Array.from(chips).find(c => c.textContent === last);
            if (found) { found.click(); return; }
        }
        chips[0]?.click();
    }

    // 拖拽文件夹
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', async e => {
        e.preventDefault();
        const items = Array.from(e.dataTransfer.items);
        const entries = items.map(i => i.webkitGetAsEntry()).filter(Boolean);
        if (!entries.length) return;
        document.getElementById('fileList').innerHTML = '<div style="padding:20px;text-align:center;color:#999">加载中…</div>';
        const files = (await Promise.all(entries.map(processEntry))).flat();
        await setFolderFiles(files);
    });

    // webkitdirectory —— file:// 协议可用（无需服务器）
    const folderInput = document.createElement('input');
    folderInput.type = 'file';
    folderInput.webkitdirectory = true;
    folderInput.style.display = 'none';
    document.body.appendChild(folderInput);
    folderInput.addEventListener('change', async () => {
        const fileList = Array.from(folderInput.files);
        if (!fileList.length) return;
        document.getElementById('fileList').innerHTML = '<div style="padding:20px;text-align:center;color:#999">加载中…</div>';
        const files = [];
        for (const file of fileList) {
            if (!/\.(json|txt)$/i.test(file.name)) continue;
            const text = await readFileAsText(file);
            try { files.push({ name: file.name, data: JSON.parse(text.trim() || '{}') }); } catch {}
        }
        await setFolderFiles(files);
        folderInput.value = '';
    });

    // FSA showDirectoryPicker（优先）；失败时回退 webkitdirectory
    async function pickDataFolder() {
        if (FSA_OK) {
            try {
                const opts = {};
                const prev = await idbGet('data-dir-handle');
                if (prev) opts.startIn = prev;
                const handle = await window.showDirectoryPicker(opts);
                await connectDataDirHandle(handle);
                return;
            } catch (e) {
                if (e.name === 'AbortError') return; // 用户取消，不做任何事
            }
        }
        folderInput.click();
    }

    // FSA 目录 handle 连接+持久化
    async function connectDataDirHandle(handle, storeToIDB = true) {
        if (storeToIDB) await idbSet('data-dir-handle', handle);
        document.getElementById('folderPathDisplay').textContent = '📁 ' + handle.name;
        document.getElementById('folderPathDisplay').title = handle.name;
        const entries = [];
        for await (const entry of handle.values()) {
            if (entry.kind === 'file' && /\.(json|txt)$/i.test(entry.name)) entries.push(entry);
        }
        const files = [];
        for (const entry of entries) {
            const file = await entry.getFile();
            const text = await file.text();
            try { files.push({ name: file.name, data: JSON.parse(text.trim() || '{}') }); } catch {}
        }
        await setFolderFiles(files);
    }

    async function reconnectDataDir(handle) {
        try {
            const perm = await handle.queryPermission({ mode: 'read' });
            if (perm === 'granted') { await connectDataDirHandle(handle, false); return true; }
            const result = await handle.requestPermission({ mode: 'read' });
            if (result === 'granted') { await connectDataDirHandle(handle, false); return true; }
        } catch (e) {}
        return false;
    }

    // 启动时尝试从 IDB 恢复数据目录
    async function tryLoadDataDir() {
        if (!FSA_OK) return;
        try {
            const h = await idbGet('data-dir-handle');
            if (h) reconnectDataDir(h);
        } catch (e) {}
    }

    document.getElementById('pickFolderBtn').addEventListener('click', pickDataFolder);

    // ════════════════════════════════════════════════
    //  初始化
    // ════════════════════════════════════════════════
    async function init() {
        // 文件状态栏（Header 右侧）
        const header = document.querySelector('.header .tabs');
        const statusBar = document.createElement('div');
        statusBar.id = 'file-status';
        statusBar.style.cssText = 'display:flex;align-items:center;gap:6px;margin-left:auto;font-size:11px;white-space:nowrap';
        header.after(statusBar);

        // 状态指示灯 + 按钮样式
        const style = document.createElement('style');
        style.textContent = `
            .fb-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block }
            .fb-dot.green  { background:#27ae60 }
            .fb-dot.orange { background:#e67e22 }
            .fb-dot.red    { background:#e74c3c }
        `;
        document.head.appendChild(style);

        updateFileBar();

        // 默认占位
        document.getElementById('folderPathDisplay').textContent = '📁 选择文件夹';
        document.getElementById('fileList').innerHTML = '<div style="padding:20px 8px;text-align:center;color:#999;font-size:12px">拖入文件夹，或点击「浏览」选择</div>';

        if (!FSA_OK) return;

        // 从 IDB 恢复 settings.json handle
        try {
            const h = await idbGet('settings-handle');
            if (h) {
                const perm = await h.queryPermission({ mode: 'readwrite' });
                if (perm === 'granted') {
                    await connectSettings(h, false);
                    return;
                }
                // 需要重新授权
                settingsHandle = h;
                const bar = document.getElementById('file-status');
                bar.innerHTML = '';
                bar.append(
                    mkEl('span', 'fb-dot orange'),
                    mkEl('span', '', { textContent: h.name + ' 需重新授权' }),
                    mkBtn('授权', () => reconnectSettings(h), true)
                );
            }
        } catch (e) { /* IDB 读取失败 */ }
    }

    init();

    function extractItems(json) {
        // 格式一：旧版 {data:{data:[...]}}
        if (Array.isArray(json.data?.data)) return json.data.data;
        // 格式二：新版 {data:{sections:[{name, parts:[{runnerName,partName,quantity}]}]}}
        if (Array.isArray(json.data?.sections)) {
            return json.data.sections.flatMap(section =>
                section.parts.map(p => ({
                    belong_part: section.name,
                    panel_no: p.runnerName,
                    comp_no: p.partName,
                    comp_count: p.quantity,
                    notes: p.notes || '',
                }))
            );
        }
        // 格式三：直接数组
        if (Array.isArray(json.data)) return json.data;
        if (Array.isArray(json)) return json;
        return [];
    }

    // 将颜色与背景混合，使其随背景色自动适配
    function blend(color, pct = 15) {
        return `color-mix(in srgb, ${color}, var(--page-bg) ${pct}%)`;
    }

    function render(items) {
        renderStatsBar(items);
        renderByPart(items);
        renderByPanel(items);
        renderCompact(items);
    }

    // ---- 板件统计栏 ----
    function renderStatsBar(items) {
        const total = items.reduce((s, i) => s + Number(i.comp_count), 0);
        const bar = document.getElementById('statsBar');
        bar.innerHTML = `共 <span class="tb-num">${total}</span> 件`;
        bar.classList.remove('hidden');
    }

    // ---- 按部位：相同板件交替灰度 ----
    function getPartOrder(parts) {
        const fileOrder = (saved.lastFile && saved.partOrder ? saved.partOrder[saved.lastFile] : null) || [];
        const ordered = [...fileOrder.filter(p => parts.includes(p))];
        const remaining = parts.filter(p => !ordered.includes(p)).sort();
        return [...ordered, ...remaining];
    }

    function renderByPart(items) {
        const groups = groupBy(items, 'belong_part');
        const el = document.getElementById('viewPart');
        el.innerHTML = '';

        getPartOrder(Object.keys(groups)).forEach(part => {
            const list = [...groups[part]].sort(sortByPanelComp);
            const total = list.reduce((s, i) => s + Number(i.comp_count), 0);
            const color = getColor(part);

            let pgIdx = -1, lastPanel = null;
            const rows = list.map(i => {
                if (i.panel_no !== lastPanel) {
                    pgIdx++;
                    lastPanel = i.panel_no;
                }
                const shade = pgIdx % 2 === 0 ? 'pg0' : 'pg1';
                return `<tr class="${shade}">
        <td class="muted">${i.panel_no}</td>
        <td class="comp-label">${i.comp_no}${i.notes ? `<div class="note-text">${i.notes}</div>` : ''}</td>
        <td class="qty">${i.comp_count}</td>
      </tr>`;
            }).join('');

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
      <div class="card-title" style="background:${blend(color)}">
        <span>${part}</span><span class="badge">共${total}件</span>
      </div>
      <table>
        <thead><tr><th>板件</th><th>编号</th><th>数量</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
            el.appendChild(card);
        });
    }

    // ---- 按板件：相同编号聚合，部位标签 ----
    function renderByPanel(items) {
        const groups = groupBy(items, 'panel_no');
        const el = document.getElementById('viewPanel');
        el.innerHTML = '';

        Object.keys(groups)
            .sort((a, b) => a.localeCompare(b, undefined, {numeric: true}))
            .forEach(panel => {
                const compMap = {};
                groups[panel].forEach(i => {
                    const key = String(i.comp_no);
                    if (!compMap[key]) compMap[key] = {parts: [], count: 0, notes: []};
                    compMap[key].parts.push(i.belong_part);
                    compMap[key].count += Number(i.comp_count);
                    if (i.notes) compMap[key].notes.push(i.notes);
                });

                const merged = Object.entries(compMap)
                    .sort(([a], [b]) => a.localeCompare(b, undefined, {numeric: true}))
                    .map(([no, v]) => ({
                        comp_no: no,
                        parts: v.parts,
                        count: v.count,
                        notes: [...new Set(v.notes)].join(' / ')
                    }));

                const total = merged.reduce((s, r) => s + r.count, 0);
                const color = getColor('panel_' + panel);

                const rows = merged.map(r => `
        <tr>
          <td class="comp-label">${r.comp_no}${r.notes ? `<div class="note-text">${r.notes}</div>` : ''}</td>
          <td class="parts-cell">${r.parts.map(p => `<span class="part-tag" style="background:${blend(getColor(p))};color:#fff">${p}</span>`).join('')}</td>
          <td class="qty">${r.count}</td>
        </tr>`).join('');

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
        <div class="card-title" style="background:${blend(color)}">
          <span>板件 ${panel}</span><span class="badge">共${total}件</span>
        </div>
        <table>
          <thead><tr><th>编号</th><th>部位</th><th>数量</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
                el.appendChild(card);
            });
    }

    // ---- 紧凑视图：按部位 → 板件行 → 编号芯片（数量>1 右上角角标）----
    // 通用视图拖拽排序
    let dragSrcPart = null;

    function savePartOrder() {
        const el = document.getElementById('viewCompact');
        const order = Array.from(el.children).map(c => c.dataset.part).filter(Boolean);
        const key = (saved.lastFile || '');
        if (!key) return;
        if (!saved.partOrder) saved.partOrder = {};
        saved.partOrder[key] = order;
        flushSettings();
    }

    function renderCompact(items) {
        const groups = groupBy(items, 'belong_part');
        const el = document.getElementById('viewCompact');
        el.innerHTML = '';

        const parts = Object.keys(groups);
        const finalOrder = getPartOrder(parts);

        finalOrder.forEach(part => {
            const list = [...groups[part]].sort(sortByPanelComp);
            const total = list.reduce((s, i) => s + Number(i.comp_count), 0);
            const color = getColor(part);

            const panelOrder = [];
            const panelMap = {};
            list.forEach(i => {
                if (!panelMap[i.panel_no]) {
                    panelMap[i.panel_no] = [];
                    panelOrder.push(i.panel_no);
                }
                panelMap[i.panel_no].push(i);
            });

            const panelRows = panelOrder.map((pno, idx) => {
                const chips = panelMap[pno].map(i => {
                    const qty = Number(i.comp_count);
                    const hasSup = qty > 1;
                    return `<span class="chip${hasSup ? ' has-sup' : ''}" style="background:${color}10;color:${color}"${i.notes ? ` title="${i.notes}"` : ''}>${i.comp_no}${hasSup ? `<sup>${qty}</sup>` : ''}</span>`;
                }).join('');
                const divider = idx > 0 ? `<div style="border-top:1px solid ${color}50;margin:1px 0"></div>` : '';
                return `${divider}<div class="panel-row">
        <span class="panel-lbl" style="background:${blend(getColor('panel_' + pno))}">${pno}</span>
        <div class="chips">${chips}</div>
      </div>`;
            }).join('');

            const seen = new Set();
            const notesList = [];
            list.forEach(i => {
                if (i.notes && !seen.has(i.panel_no + '\0' + i.comp_no + '\0' + i.notes)) {
                    seen.add(i.panel_no + '\0' + i.comp_no + '\0' + i.notes);
                    notesList.push({ panel: i.panel_no, comp: i.comp_no, note: i.notes });
                }
            });
            const notesHtml = notesList.length
                ? `<div class="compact-notes">${notesList.map(n =>
                    `<div class="compact-note"><strong class="note-panel">${n.panel}${n.comp}</strong> ${n.note}</div>`
                ).join('')}</div>`
                : '';

            const card = document.createElement('div');
            card.className = 'ccard';
            card.dataset.part = part;
            card.innerHTML = `
      <div class="ccard-title" style="background:${blend(color)}">
        <span>${part}</span><span class="badge">共${total}件</span>
      </div>
      <div class="ccard-body">${panelRows}${notesHtml}</div>`;
            el.appendChild(card);

            // 拖拽绑定
            card.draggable = true;
            card.addEventListener('dragstart', e => {
                dragSrcPart = part;
                card.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                document.querySelectorAll('.ccard').forEach(c => c.classList.remove('drag-over'));
            });
            card.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                card.classList.add('drag-over');
            });
            card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
            card.addEventListener('drop', e => {
                e.preventDefault();
                card.classList.remove('drag-over');
                if (dragSrcPart === part) return;
                const all = Array.from(el.children);
                const src = all.find(c => c.dataset.part === dragSrcPart);
                const tgt = all.find(c => c.dataset.part === part);
                if (!src || !tgt) return;
                if (src.compareDocumentPosition(tgt) & Node.DOCUMENT_POSITION_FOLLOWING) tgt.after(src);
                else tgt.before(src);
                savePartOrder();
            });
        });
    }

    function groupBy(arr, key) {
        return arr.reduce((acc, item) => {
            const k = item[key] ?? '未知';
            (acc[k] ??= []).push(item);
            return acc;
        }, {});
    }

    function sortByPanelComp(a, b) {
        return a.panel_no.localeCompare(b.panel_no, undefined, {numeric: true}) ||
            String(a.comp_no).localeCompare(String(b.comp_no), undefined, {numeric: true});
    }
</script>
